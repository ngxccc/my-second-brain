<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Quiz - Comprehensive Review (40 Questions)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>KANBAN METHODOLOGY</h1>
        <p>Comprehensive Kanban Review (40 Questions)</p>
      </header>

      <div class="card" id="quiz-card">
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="quiz-screen" id="quiz-screen">
          <div class="question-info" id="question-info">QUESTION 1 OF 40</div>
          <div class="question-text" id="question-text">
            Câu hỏi đang được tải...
          </div>

          <div class="options-list" id="options-list">
            <!-- Options will be rendered dynamically -->
          </div>

          <div class="controls">
            <div
              style="color: var(--color-secondary); font-size: 0.85rem"
              id="feedback-msg"
            >
              Chọn câu trả lời và nhấn Submit
            </div>
            <button class="btn-primary" id="action-btn" disabled>Submit</button>
          </div>

          <div class="explanation" id="explanation-box">
            <div class="explanation-title" id="explanation-title">
              Giải thích
            </div>
            <div id="explanation-text">...</div>
          </div>
        </div>

        <div class="results-screen" id="results-screen">
          <div class="score-circle">
            <div class="score-num" id="final-score">0</div>
            <div class="score-label">Đúng</div>
          </div>
          <div class="result-msg" id="result-msg">Hoàn thành tốt!</div>
          <button class="btn-primary" onclick="restartQuiz()">
            Làm lại Quiz
          </button>
        </div>
      </div>
    </div>

    <script>
      const questions = [
        {
          question:
            "Từ 'Kanban' có nghĩa là gì trong tiếng Nhật và bắt nguồn từ đâu?",
          options: [
            "Có nghĩa là 'Lập trình tinh gọn', bắt nguồn từ hãng Honda vào năm 1950.",
            "Có nghĩa là 'Vòng lặp ngắn', bắt nguồn từ dự án phát triển phần mềm của Microsoft.",
            "Có nghĩa là 'Bảng trực quan' hoặc 'Thẻ báo hiệu', bắt nguồn từ hãng Toyota cuối những năm 1940.",
            "Có nghĩa là 'Cải tiến liên tục', bắt nguồn từ ngành công nghiệp đóng tàu Nhật Bản.",
          ],
          correct: 2,
          explanation:
            "Kanban (看板) nghĩa là 'bảng trực quan' hoặc 'thẻ báo hiệu', bắt nguồn từ Taiichi Ohno tại hãng xe hơi Toyota cuối những năm 1940 để phục vụ sản xuất Just-in-Time.",
        },
        {
          question:
            "Ai là người đã áp dụng thành công các nguyên lý của Kanban vào ngành công nghiệp phát triển phần mềm và công việc tri thức vào năm 2004?",
          options: [
            "David J. Anderson",
            "Jeff Sutherland",
            "Ken Schwaber",
            "Martin Fowler",
          ],
          correct: 0,
          explanation:
            "David J. Anderson là người đi tiên phong trong việc áp dụng các nguyên lý sản xuất tinh gọn của Kanban vào phát triển phần mềm và công việc tri thức từ năm 2004.",
        },
        {
          question:
            "Mô hình vận hành của Kanban để quản lý dòng công việc (Workflow) là gì?",
          options: [
            "Mô hình Đẩy (Push system) - Công việc được giao ép từ trên xuống bất kể năng lực.",
            "Mô hình Kéo (Pull system) - Chỉ nhận việc mới khi có nhu cầu thực tế và năng lực cho phép.",
            "Mô hình Thác nước (Waterfall) - Hoàn thành tất cả các pha một cách tuần tự.",
            "Mô hình Tự do (Ad-hoc) - Thành viên tự làm bất kỳ việc gì mình thích không cần quy trình.",
          ],
          correct: 1,
          explanation:
            "Kanban là một hệ thống 'Kéo' (Pull System), tức là công việc chỉ được kéo vào giai đoạn tiếp theo khi có tín hiệu trống (năng lực sẵn sàng) từ công đoạn đó.",
        },
        {
          question:
            "Đâu là một trong 4 Nguyên lý quản lý thay đổi (Change Management Principles) của Kanban theo chuẩn Kanban University?",
          options: [
            "Bắt đầu từ những gì bạn đang làm hiện tại (Start with what you do now).",
            "Yêu cầu đổi mới toàn bộ vai trò và chức danh trong tổ chức ngay lập tức.",
            "Cấm thay đổi quy trình cũ dù gặp bất kỳ lỗi hay cản trở nào.",
            "Chỉ cho phép quản lý cấp cao đưa ra các đề xuất cải tiến quy trình.",
          ],
          correct: 0,
          explanation:
            "Nguyên lý đầu tiên của Kanban là 'Start with what you do now': Bắt đầu bằng việc trực quan hóa quy trình hiện tại mà không lập tức thay đổi cấu trúc vai trò hay chức danh hiện hành.",
        },
        {
          question:
            "Tại sao nguyên lý thứ 3 của Kanban yêu cầu 'Tôn trọng quy trình, vai trò, trách nhiệm & chức danh hiện hành'?",
          options: [
            "Để ngăn cản mọi sự cải tiến quy trình trong tương lai.",
            "Để tránh gây xáo trộn tổ chức đột ngột, xây dựng lòng tin và giảm sự kháng cự của đội ngũ khi áp dụng phương pháp mới.",
            "Vì quy trình hiện tại luôn hoàn hảo và không cần sửa đổi.",
            "Để đảm bảo nhóm trưởng luôn giữ vững quyền lực tối cao.",
          ],
          correct: 1,
          explanation:
            "Bằng cách tôn trọng cấu trúc hiện tại, Kanban giảm thiểu tối đa sự phòng thủ hoặc phản kháng từ đội ngũ, tạo tiền đề để thực hiện các bước cải tiến tiến hóa sau đó.",
        },
        {
          question:
            "Thực hành 'Giới hạn công việc đang làm' (Limit Work in Progress - WIP Limit) có ý nghĩa cốt lõi gì?",
          options: [
            "Đặt số lượng task tối đa được phép xử lý cùng lúc tại mỗi giai đoạn/cột trên bảng Kanban.",
            "Giới hạn số giờ làm việc tối đa của một thành viên trong một ngày.",
            "Giới hạn số lượng bug tối đa mà tester được phép phát hiện.",
            "Quy định số lượng thành viên tối đa được phép tham gia vào một dự án.",
          ],
          correct: 0,
          explanation:
            "WIP Limit là giới hạn trực tiếp số thẻ công việc được phép tồn tại ở mỗi cột trên bảng Kanban nhằm tập trung giải quyết dứt điểm công việc cũ trước khi bắt việc mới.",
        },
        {
          question:
            "Câu châm ngôn nào tóm tắt chính xác triết lý đằng sau thực hành giới hạn WIP?",
          options: [
            '"Stop starting, start finishing" (Ngừng bắt đầu, hãy bắt đầu hoàn thành).',
            '"Stop finishing, start starting" (Ngừng hoàn thành, hãy bắt đầu bắt đầu).',
            '"Fail fast, fail often" (Thất bại nhanh, thất bại nhiều).',
            '"Think big, act small" (Nghĩ lớn, làm nhỏ).',
          ],
          correct: 0,
          explanation:
            "Triết lý của WIP Limit là 'Stop starting, start finishing' - tập trung hoàn thành các công việc đang dang dở thay vì liên tục mở ra các công việc mới.",
        },
        {
          question:
            "WIP Limit giúp giải quyết vấn đề lớn nào dưới đây của thành viên trong nhóm phát triển?",
          options: [
            "Giúp lập trình viên viết code nhanh hơn mà không cần test.",
            "Giảm thiểu lãng phí thời gian và giảm chất lượng do đa nhiệm (multitasking) và chuyển ngữ cảnh liên tục.",
            "Giúp tăng số lượng cuộc họp Daily Scrum trong ngày.",
            "Loại bỏ hoàn toàn vai trò của Scrum Master hoặc Nhóm trưởng.",
          ],
          correct: 1,
          explanation:
            "Đa nhiệm (làm nhiều việc một lúc) tốn rất nhiều thời gian chuyển ngữ cảnh. WIP Limit giữ số việc dang dở ở mức thấp để thành viên tập trung hoàn thành nhanh và chất lượng nhất.",
        },
        {
          question:
            "Khi số lượng thẻ trong một cột chạm ngưỡng WIP Limit, đây là tín hiệu của điều gì và đội ngũ nên phản ứng như thế nào?",
          options: [
            "Tín hiệu công việc đang trôi chảy, cứ tiếp tục kéo thêm việc mới vào cột đó.",
            "Tín hiệu xuất hiện 'Điểm nghẽn' (Bottleneck). Cả nhóm cần ngưng nhận việc mới và tập trung hỗ trợ (swarming) giải quyết công việc ở cột đó để khơi thông dòng chảy.",
            "Tín hiệu cho thấy thành viên ở cột đó làm việc kém hiệu quả, cần thay thế nhân sự ngay lập tức.",
            "Không cần làm gì, cứ để thẻ ùn ứ vì cột Done không giới hạn WIP.",
          ],
          correct: 1,
          explanation:
            "Khi một cột chạm giới hạn WIP, đó là tín hiệu của bottleneck. Cả nhóm cần chung tay (swarming) để giải quyết các task bị tắc nghẽn ở cột đó trước khi có thể kéo thêm việc mới vào quy trình.",
        },
        {
          question: "Điểm cam kết (Commitment Point) trên bảng Kanban là gì?",
          options: [
            "Thời điểm khách hàng viết yêu cầu đưa vào Backlog.",
            "Thời điểm team đồng ý tiếp nhận task từ backlog và bắt đầu thực hiện nó.",
            "Thời điểm task hoàn thành toàn bộ kiểm thử và sẵn sàng bàn giao.",
            "Thời điểm nhóm trưởng bàn giao code cho khách hàng.",
          ],
          correct: 1,
          explanation:
            "Commitment Point là thời điểm team cam kết thực hiện công việc và kéo thẻ từ backlog/yêu cầu vào quy trình xử lý thực tế (ví dụ: chuyển sang cột To do hoặc In Progress).",
        },
        {
          question: "Điểm bàn giao (Delivery Point) trên bảng Kanban là gì?",
          options: [
            "Thời điểm lập trình viên code xong và chuyển sang Code Review.",
            "Thời điểm tester bắt đầu viết testcase cho tính năng.",
            "Thời điểm công việc được hoàn tất hoàn toàn, đạt Definition of Done và chuyển tới tay khách hàng/mentor.",
            "Thời điểm nhóm trưởng tạo task trên GitHub Projects.",
          ],
          correct: 2,
          explanation:
            "Delivery Point là điểm cuối của quy trình Kanban, khi công việc đã hoàn thành 100% đạt chuẩn chất lượng và bàn giao thành công cho khách hàng/mentor.",
        },
        {
          question: "Chỉ số 'Lead Time' trong Kanban được tính như thế nào?",
          options: [
            "Từ khi bắt đầu code (Commitment Point) đến khi bàn giao (Delivery Point).",
            "Từ khi khách hàng đưa yêu cầu vào Backlog đến khi bàn giao thành công (Delivery Point).",
            "Từ khi bắt đầu Sprint Planning đến khi kết thúc Sprint Retrospective.",
            "Thời gian lập trình viên viết code và sửa lỗi.",
          ],
          correct: 1,
          explanation:
            "Lead Time (Thời gian hoàn thành) tính từ lúc yêu cầu được tạo ra/ghi nhận ở backlog cho đến khi sản phẩm được bàn giao thực tế cho khách hàng.",
        },
        {
          question: "Chỉ số 'Cycle Time' trong Kanban được tính như thế nào?",
          options: [
            "Từ khi bắt đầu thực hiện task (Commitment Point) đến khi hoàn thành bàn giao (Delivery Point).",
            "Từ khi khách hàng đưa yêu cầu vào Backlog đến khi bàn giao thành công (Delivery Point).",
            "Khoảng thời gian họp Daily standup hàng ngày.",
            "Khoảng thời gian sửa một bug phát sinh từ phía Tester.",
          ],
          correct: 0,
          explanation:
            "Cycle Time (Thời gian chu kỳ) đo lường thời gian thực tế để xử lý một task, tính từ lúc bắt đầu làm (Commitment Point) đến khi hoàn tất (Delivery Point).",
        },
        {
          question:
            "Đâu là sự khác biệt cơ bản giữa Kanban và Scrum về cách quản lý sự thay đổi yêu cầu?",
          options: [
            "Scrum cho phép thay đổi yêu cầu bất kỳ lúc nào giữa Sprint; Kanban tuyệt đối cấm thay đổi.",
            "Cả hai phương pháp đều cấm thay đổi yêu cầu sau khi dự án đã bắt đầu.",
            "Scrum hạn chế thay đổi trong Sprint Backlog khi Sprint đang chạy; Kanban chấp nhận thay đổi bất kỳ lúc nào ở cột To do trước điểm cam kết.",
            "Kanban yêu cầu họp bàn lại toàn bộ kiến trúc mỗi khi có thay đổi; Scrum tự động cập nhật code.",
          ],
          correct: 2,
          explanation:
            "Scrum cam kết một khối lượng việc cố định trong Sprint và tránh thay đổi dòng việc này. Kanban linh hoạt hơn, cho phép PO thay đổi thứ tự ưu tiên hoặc thay task mới ở cột To do bất kỳ lúc nào nếu task đó chưa được kéo vào làm.",
        },
        {
          question:
            "Trong quản lý dự án MockProject trên GitHub Projects, các cột trên bảng Kanban được quy định gồm những cột nào?",
          options: [
            "Backlog, Design, Code, Test, Deploy",
            "To do, In Progress, Done",
            "Sprint Backlog, Daily Tasks, Blocked, Done",
            "Draft, Reviewing, Approved, Closed",

          correct: 1,
          explanation:
            "MockProject quy định thiết lập bảng Kanban đơn giản trên GitHub Projects gồm 3 cột cơ bản: To do, In Progress và Done.",
        },
        {
          question:
            "Quy trình kéo thả và cập nhật bảng Kanban trên GitHub Projects được phân chia trách nhiệm như thế nào?",

            "Thành viên tự tạo task và tự kéo sang Done; nhóm trưởng chỉ đứng xem.",

            "Mentor sẽ trực tiếp kéo thả tất cả các task của mọi nhóm.",
            "Tester chịu trách nhiệm kéo tất cả các task từ To do sang In Progress và Done.",
          ],
          correct: 1,
          explanation:
            "Nhóm trưởng có vai trò quản lý chung, khởi tạo task đưa vào To do. Thành viên là người trực tiếp thực thi nên phải tự giác cập nhật trạng thái In Progress và Done của task mình phụ trách.",
        },
        {
          question:
            "Nhãn (Label) nào dưới đây dùng để đánh giá tiến độ của task trên GitHub Projects và nó được gán vào lúc nào?",
          options: [
            "Gán label 'On-time' ngay khi vừa tạo task ở cột To do.",
            "Gán label 'Delayed' khi task đang làm trong cột In Progress được 1 tiếng.",
            "Gán các label đánh giá như 'On-time', 'Delayed', hoặc 'Over-Progress' sau khi task đã hoàn thành và nằm ở cột Done (Closed).",
            "Gán label 'Task' sau khi đã đóng issue.",
          ],
          correct: 2,
          explanation:
            "Chỉ tiến hành đánh giá hiệu suất tiến độ sau khi công việc đã thực sự hoàn thành (nằm ở cột Done/Closed). Nhóm trưởng sẽ vào audit để gắn nhãn tiến độ tương ứng.",
        },
        {
          question:
            "Thành viên dự án cần thực hiện quy trình 3 bước nào ngay sau khi hoàn thành 1 task?",

            "Gửi mail cho mentor -> Tạo thêm task mới -> Chờ nhóm trưởng đóng task hộ.",
            "Ghi nhật ký -> Đợi cuối tuần báo cáo họp Daily Scrum.",
          ],
          correct: 0,
          explanation:
            "Sau khi xong task, thành viên phải: 1. Báo cáo nhóm (Zalo/Email); 2. Đẩy sản phẩm lên GitHub/Drive; 3. Đóng issue và chuyển sang cột Done trên GitHub Kanban.",
        },
        {
          question:
            "Nếu ước lượng làm một task là 4 tiếng, nhưng thành viên nhận thấy mình không thể hoàn thành kịp deadline thì phải báo cáo trễ hạn vào lúc nào?",
          options: [
            "Báo cáo vào cuối ngày khi họp Daily Scrum ngày hôm sau.",

        },
        {
          question:
            "Trong file WBS cá nhân (MockProject_WorkBreakDown_TenThanhVien.xlsx), cột Actual Effort (thời gian làm việc thực tế) được điền vào thời điểm nào?",

            "Chỉ điền một lần vào cuối Sprint trước khi nộp toàn bộ dự án.",

          correct: 1,
          explanation:
            "Cột Estimated Effort được điền vào đầu buổi sáng cho các task của ngày hôm nay. Cột Actual Effort được điền vào cuối ngày hoặc sáng hôm sau để phản ánh chính xác thời gian thực tế đã làm cho ngày hôm trước.",
        },
